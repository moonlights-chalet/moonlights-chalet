<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>شالية أضواء القمر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: 'Cairo', sans-serif;
  background: #0f0f0f;
  color: white;
  scroll-behavior: smooth;
}

/* Navbar */
.navbar {
  position: fixed;
  width:100%;
  background: rgba(0,0,0,0.85);
  display:flex;
  justify-content: space-around;
  padding:15px;
  z-index:1000;
}

.navbar a {
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.navbar a:hover {
  color:#d4af37;
}

/* Hero */
.hero {
  height:100vh;
  background:url('1.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
}

.hero-content {
  position:relative;
  z-index:2;
  padding:20px;
}

.hero h1 {
  font-size:48px;
  margin-bottom:15px;
}

.hero p {
  font-size:20px;
  margin-bottom:20px;
}

/* Button */
.btn {
  background:#d4af37;
  padding:12px 30px;
  border:none;
  color:black;
  font-size:18px;
  cursor:pointer;
  border-radius:6px;
  transition:0.3s;
}

.btn:hover {
  background:#f1c40f;
  transform:scale(1.05);
}

/* Section */
.section {
  padding:70px 20px;
  text-align:center;
}

.section h2 {
  margin-bottom:40px;
  font-size:30px;
}

/* Cards */
.cards {
  display:flex;
  flex-wrap:wrap;
  gap:25px;
  justify-content:center;
}

.card {
  background:#1c1c1c;
  border-radius:12px;
  overflow:hidden;
  width:300px;
  transition:0.4s;
}

.card:hover {
  transform:translateY(-10px);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3 {
  padding:15px;
}

/* WhatsApp Floating */
.whatsapp {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  color:white;
  text-decoration:none;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* Footer */
footer {
  background:#111;
  text-align:center;
  padding:25px;
  margin-top:30px;
  font-size:14px;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <a href="#">الرئيسية</a>
  <a href="#about">عن الشالية</a>
  <a href="#contact">التواصل</a>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <h1>شالية أضواء القمر</h1>
    <p>استمتع بأجمل الأوقات مع أجواء فاخرة وخصوصية تامة</p>
    <a href="https://wa.me/962787015053">
      <button class="btn">احجز الآن</button>
    </a>
  </div>
</div>

<!-- About -->
<div class="section" id="about">
  <h2>مميزات الشالية</h2>

  <div class="cards">

    <div class="card">
      <img src="2.jpg">
         <h3>شالية اضواء القمر</h3>
    </div>

    <div class="card">
      <img src="3.jpg">
      <h3>شالية اضواء القمر</h3>
    </div>

    <div class="card">
      <img src="4.jpg">
         <h3>شالية اضواء القمر</h3>
    </div>

  </div>
</div>

<!-- Contact -->
<div class="section" id="contact">
  <h2>للحجز</h2>
  <a href="https://wa.me/962787015053">
    <button class="btn">تواصل واتساب</button>
  </a>
</div>

<!-- Floating WhatsApp -->
<a class="whatsapp" href="https://wa.me/962787015053">💬</a>

<!-- Footer -->
<footer>
  <p>© جميع الحقوق محفوظة - شالية أضواء القمر</p>
</footer>

</body>
</html>
